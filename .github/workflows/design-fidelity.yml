# ==============================================================================
# Figma → Code 검증 CI Pipeline
#
# PR마다 자동으로 3-Layer 검증을 실행합니다:
#   Layer 3: ESLint/Stylelint (토큰 하드코딩 방지)
#   Layer 2: Playwright 구조적 검증 (CSS 수치 일치)
#   Layer 1: Playwright 시각적 검증 (스크린샷 비교)
#   Bonus:   uiMatch Figma ↔ Storybook 비교 (선택)
# ==============================================================================

name: Design Fidelity Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.config.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Layer 3: 정적 분석 (토큰 하드코딩 방지) ─────────────────────
  lint:
    name: "Layer 3: Lint & Token Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run lint:css
      - run: npm run verify:tokens

  # ─── Layer 2: 구조적 CSS 검증 ────────────────────────────────────
  structural:
    name: "Layer 2: Structural CSS Verification"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run structural tests
        run: npm run test:structural

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: structural-report
          path: playwright-report/
          retention-days: 7

  # ─── Layer 1: 시각적 스크린샷 비교 ───────────────────────────────
  visual:
    name: "Layer 1: Visual Regression Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run visual tests
        run: npm run test:visual

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-report
          path: |
            playwright-report/
            tests/visual/**/*-snapshots/
          retention-days: 14

